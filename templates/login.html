{% extends 'base.html' %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 80vh; background-color: var(--light);">
    <div style="background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px;">
        <div style="text-align: center; margin-bottom: 30px;">
            <h2 style="color: var(--primary); margin: 0 0 10px 0; font-size: 28px;">Bienvenido</h2>
            <p style="color: #6B7280; margin: 0;">Ingresa con tus credenciales de acceso</p>
        </div>

        {% if messages %}
        <div style="margin-bottom: 20px;">
            {% for message in messages %}
            <div style="padding: 10px; border-radius: 8px; font-size: 14px; text-align: center;
                 {% if message.tags == 'error' %}background: #FEE2E2; color: #991B1B; border: 1px solid #F87171;
                 {% elif message.tags == 'success' %}background: #D1FAE5; color: #065F46; border: 1px solid #34D399;
                 {% else %}background: #DBEAFE; color: #1E40AF; border: 1px solid #60A5FA;{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            <div style="margin-bottom: 20px;">
                <label for="username" style="display: block; font-weight: 600; margin-bottom: 8px; color: var(--dark);">Usuario o Email</label>
                <input type="text" id="username" name="username" required 
                       style="width: 100%; padding: 12px; border: 1px solid #D1D5DB; border-radius: 8px; font-size: 16px; box-sizing: border-box;">
            </div>
            
            <div style="margin-bottom: 25px;">
                <label for="password" style="display: block; font-weight: 600; margin-bottom: 8px; color: var(--dark);">Contraseña</label>
                <input type="password" id="password" name="password" required 
                       style="width: 100%; padding: 12px; border: 1px solid #D1D5DB; border-radius: 8px; font-size: 16px; box-sizing: border-box;">
            </div>

            <button type="submit" 
                    style="width: 100%; padding: 14px; background-color: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; transition: background-color 0.3s;">
                INICIAR SESIÓN
            </button>
        </form>

        <div style="text-align: center; margin-top: 25px; font-size: 14px; color: #6B7280;">
            ¿No tienes cuenta de vendedor? <br>
            <a href="{% url 'registrar_vendedor' %}" style="color: var(--primary); text-decoration: none; font-weight: 600;">Regístrate aquí</a>
        </div>
    </div>
</div>
{% endblock %}
