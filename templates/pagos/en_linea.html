{% extends 'base.html' %}
{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 80vh; background-color: var(--light);">
    <div style="background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px;">
        <h2 style="color: var(--primary); margin: 0 0 10px 0; text-align: center;">Pagos en Línea (PSE)</h2>
        <p style="text-align: center; color: #6B7280; margin-bottom: 30px;">Plan: {{ plan }} | Valor a pagar: ${{ precio }}</p>
        
        <form method="POST">
            {% csrf_token %}
            <div style="margin-bottom: 20px;">
                <label style="display: block; font-weight: 600; margin-bottom: 8px;">Tipo de Persona:</label>
                <select name="tipo_persona" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #D1D5DB;">
                    <option value="NATURAL">Persona Natural</option>
                    <option value="JURIDICA">Persona Jurídica</option>
                </select>
            </div>
            
            <div style="margin-bottom: 20px;">
                <label style="display: block; font-weight: 600; margin-bottom: 8px;">Número de Identificación:</label>
                <input type="text" name="identificacion" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #D1D5DB;">
            </div>
            
            <div style="margin-bottom: 30px;">
                <label style="display: block; font-weight: 600; margin-bottom: 8px;">Entidad Bancaria:</label>
                <select name="banco" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #D1D5DB;">
                    <option value="BANCOLOMBIA">Bancolombia</option>
                    <option value="DAVIVIENDA">Davivienda</option>
                    <option value="BOGOTA">Banco de Bogotá</option>
                    <option value="OCCIDENTE">Banco de Occidente</option>
                    <option value="NUBANK">Nubank</option>
                </select>
            </div>
            
            <button type="submit" style="width: 100%; padding: 14px; background-color: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">
                Ir al Banco y Pagar
            </button>
            <a href="{% url 'vendedor_dashboard' %}" style="display: block; text-align: center; margin-top: 15px; color: var(--error); text-decoration: none;">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
