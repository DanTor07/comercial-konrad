{% extends 'base.html' %}

{% block title %}Finalizar Compra - Comercial Konrad{% endblock %}

{% block content %}
<div class="center-page">
    <div class="form-card" style="max-width: 600px;">
        <h1 style="margin: 0 0 24px 0;">Finalizar Compra</h1>
        <form method="POST">
            {% csrf_token %}
            <h3 style="margin: 0 0 16px 0; font-size: 1rem; color: var(--gray); text-transform: uppercase; letter-spacing: 0.05em;">Selecciona tu método de pago</h3>
            <label class="method-card">
                <input type="radio" name="metodo_pago" value="LINEA" required>
                <span>🏦 Pago en Línea (PSE)</span>
            </label>
            <label class="method-card">
                <input type="radio" name="metodo_pago" value="TARJETA">
                <span>💳 Tarjeta de Crédito</span>
            </label>
            <label class="method-card">
                <input type="radio" name="metodo_pago" value="CONSIGNACION">
                <span>🧾 Consignación Bancaria</span>
            </label>
            <button type="submit" class="btn btn-primary btn-full" style="padding: 15px; margin-top: 8px;">Pagar Ahora</button>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_css %}
<style>
.method-card {
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 500;
    transition: border-color 0.2s;
}
.method-card:hover { border-color: var(--primary); }
.method-card input { accent-color: var(--primary); }
</style>
{% endblock %}
